<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            font-family: Arial;
        }

        .card-container{
            display: flex;
            gap: 20px; 
            justify-content: center;
        }

        button{
            box-shadow: 0 4px 8px 0 rgba(22, 9, 32, 0.849);
            padding: 8px 12px;
            color: white;
            border: none;
        }

        .card{
            box-shadow: 0 4px 8px 0 rgba(22, 9, 32, 0.849);
            width: 250px;
            border-radius: 5px;
            overflow: hidden;
        }

        .card:hover{
            box-shadow: 0 4px 8px 0 rgba(255,0,0,0.6);
        }

        .container{
            padding: 10px;
            text-align: center;
        }

        img{
            width: 100%;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

<div class="card-container">

    <div class="card">
        <img src="miles .jpeg" alt="Miles Morales">
        <div class="container">
            <h4><b>Miles Morales</b></h4>
            <p>Marvel Character</p>
            <button style="background-color: rgb(150, 9, 9);">Click here</button>
        </div>
    </div>

    <div class="card">
        <img src="screenshot.marvels-spider-man-miles-morales.jpg" alt="Miles Morales">
        <div class="container">
            <h4><b>Miles Morales</b></h4>
            <p>Marvel Character</p>
            <button style="background-color: rgb(150, 9, 9);">Click here</button>
        </div>
    </div>

    <div class="card">
        <img src="screenshot.marvels-spider-man2.jpg" alt="Spider man">
        <div class="container">
            <h4><b>Spider man</b></h4>
            <p>Marvel Character</p>
            <button style="background-color: rgb(150, 9, 9);">Click here</button>
            <centre><i class="fa-solid fa-music"></i></centre>

        </div>
    </div>

</div>

</body>
</html>
