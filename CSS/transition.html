<!DOCTYPE html>
<html>
<head>
<style>

/* Transition Example */
.transition-box {
    width: 100px;
    height: 100px;
    background-color: rgba(0, 94, 255, 0.8);
    transition: width 2s, height 2s;
}

.transition-box:hover {
    width: 300px;
    height: 300px;
    background-color: rgb(48, 222, 205);
}


/* Animation Delay Example */
.delay-box {
    width: 100px;
    height: 100px;
    background-color: rgb(200, 0, 255);
    position: relative;
    animation: moveBox 4s 2s 5;
}

@keyframes moveBox {
  0%   {background-color:rgb(163, 28, 28); left:0; top:0;}
  25%  {background-color:rgb(98, 228, 11); left:200px; top:0;}
  50%  {background-color:rgb(15, 15, 187); left:200px; top:200px;}
  75%  {background-color:rgb(186, 5, 99); left:0; top:200px;}
  100% {background-color:red; left:0; top:0;}
}


/* Timing Function Example */
.timing-box {
  width: 100px;
  height: 50px;
  background-color: rgb(153, 0, 255);
  font-weight: bold;
  position: relative;
  animation: slide 5s infinite;
}

#div1 {animation-timing-function: linear;}
#div2 {animation-timing-function: ease;}
#div3 {animation-timing-function: ease-in;}
#div4 {animation-timing-function: ease-out;}
#div5 {animation-timing-function: ease-in-out;}

@keyframes slide {
  from {left: 0;}
  to {left: 300px;}
}

</style>
</head>

<body>

<h1>Transition Part</h1>
<div class="transition-box"></div>

<h1>Animation Timing Function</h1>
<div id="div1" class="timing-box">linear</div>
<div id="div2" class="timing-box">ease</div>
<div id="div3" class="timing-box">ease-in</div>
<div id="div4" class="timing-box">ease-out</div>
<div id="div5" class="timing-box">ease-in-out</div>

<h1>Animation Delay</h1>
<div class="delay-box"></div>
</body>
</html>
